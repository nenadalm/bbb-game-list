on:
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  create-project-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '11'
      - uses: DeLaGuardo/setup-clojure@master
        with:
          cli: '1.11.3.1463'
      - uses: actions/cache@v4
        with:
          path: '~/.m2'
          key: "${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}"
          restore-keys: |
            ${{ runner.os }}-maven-
      - run: clojure -X app.core/create-projects-data
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      - name: Upload project data
        uses: actions/upload-artifact@v4
        with:
          name: project-data
          path: importer/target
          if-no-files-found: error
          retention-days: 7
  create-data-from-project-data:
    needs: create-project-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '11'
      - uses: DeLaGuardo/setup-clojure@master
        with:
          cli: '1.11.3.1463'
      - uses: actions/cache@v4
        with:
          path: '~/.m2'
          key: "${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}"
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Download data
        uses: actions/download-artifact@v4
        with:
          path: importer/target
      - uses: actions/cache@v4
        with:
          path: './importer/resources/.cache/url'
          key: "url-${{ matrix.project }}-${{ steps.get-month.outputs.day }}"
      - run: clojure -X app.core/create-data-from-projects-data
        env:
          BGG_TOKEN: ${{ secrets.BGG_TOKEN }}
      - name: Push changes
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Update game list" || true
          git push
